name: CI + Sync SDK -> backend-sdk

on:
  push:
    branches: [ "main" ]

permissions:
  contents: write
  pull-requests: write

env:
  SDK_REPO: "ViewlessNote/repo-B"
  SDK_DIR: "sdk"

jobs:
  build-and-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.20'

      - name: Detect SDK changes
        id: detect
        run: |
          CHANGED=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} -- ${{ env.SDK_DIR }} || true)
          echo "changed_files<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGED" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Install Protobuf
        if: steps.detect.outputs.changed_files != ''
        uses: bufbuild/buf-setup-action@v1.50.0

      - name: Buf Generate (if SDK changes)
        if: steps.detect.outputs.changed_files != ''
        run: |
        working-directory: ${{ env.SDK_DIR }}
          echo "SDK changes detected; running 'buf generate'..."
          wo
          buf generate

      - name: Exit if no SDK changes
        if: steps.detect.outputs.changed_files == ''
        run: echo "No sdk/ changes — nothing to sync."

      - name: Create subtree split commit (SHA) & local branch
        if: steps.detect.outputs.changed_files != ''
        id: split
        run: |
          set -euo pipefail
          SDK_DIR="${{ env.SDK_DIR }}"
          # erzeugt eine Commit-SHA, die nur den Inhalt von SDK_DIR enthält (oder leer)
          SPLIT_COMMIT=$(git subtree split --prefix="${SDK_DIR}" 2>/dev/null || true)
          echo "split_commit=${SPLIT_COMMIT}" >> $GITHUB_OUTPUT

          if [ -z "${SPLIT_COMMIT}" ]; then
            echo "No subtree split commit produced for prefix '${SDK_DIR}'. Nothing to push."
            exit 0
          fi

          # lege lokal einen Branch an (hilft beim Debugging)
          BRANCH="ci/paas-sdk-sync-${GITHUB_RUN_ID}"
          if git show-ref --verify --quiet "refs/heads/${BRANCH}"; then
            git branch -D "${BRANCH}" || true
          fi
          git branch "${BRANCH}" "${SPLIT_COMMIT}"
          echo "created_local_branch=${BRANCH}" >> $GITHUB_OUTPUT
          echo "split_branch=${BRANCH}" >> $GITHUB_OUTPUT

      - name: Install GitHub CLI (gh)
        if: steps.detect.outputs.changed_files != ''
        run: |
          sudo apt-get update -y
          sudo apt-get install -y gh
          echo "${{ secrets.SDK_REPO_TOKEN }}" | gh auth login --with-token

      - name: Checkout repo-B (target)
        if: steps.detect.outputs.changed_files != ''
        uses: actions/checkout@v4
        with:
          repository: ${{ env.SDK_REPO }}
          token: ${{ secrets.SDK_REPO_TOKEN }}
          path: repo-B
          fetch-depth: 0

      - name: Sync SDK directory into repo-B and push
        id: push
        if: steps.detect.outputs.changed_files != ''
        working-directory: repo-B
        env:
          SDK_DIR: ${{ env.SDK_DIR }}
          SDK_REPO_TOKEN: ${{ secrets.SDK_REPO_TOKEN }}
        run: |
          set -euo pipefail
          BRANCH="ci/paas-sdk-sync-${GITHUB_RUN_ID}"
          SRC_DIR="$GITHUB_WORKSPACE/${SDK_DIR}"
          DST_DIR="$PWD"   # repo-B working dir

          echo "Copying files from $SRC_DIR -> $DST_DIR on branch $BRANCH"
          git config --global user.email "${GITHUB_ACTOR}@users.noreply.github.com"
          git config --global user.name "${GITHUB_ACTOR} (GitHub Actions)"

          # create and switch to branch
          git checkout -b "${BRANCH}"

          # copy contents (overwrite) — preserve .git in dst
          rsync -a --delete --exclude='.git' "${SRC_DIR}/" "${DST_DIR}/"

          # detect changes
          if git status --porcelain | tee /tmp/git_status | grep -q .; then
            git add -A
            git commit -m "CI: sync ${SDK_DIR} from ${GITHUB_REPOSITORY}@${GITHUB_SHA}"
            # push; actions/checkout already configured origin with token
            git push origin "${BRANCH}"
            echo "pushed_branch=${BRANCH}" >> $GITHUB_OUTPUT
          else
            echo "No changes to commit in ${SDK_DIR}; nothing pushed."
            # leave outputs empty or set pushed_branch to empty if you like
          fi

      - name: Create PR in repo-B via gh
        if: steps.detect.outputs.changed_files != '' && steps.push.outputs.pushed_branch != ''
        env:
          TARGET_REPO: ${{ env.SDK_REPO }}
        id: gh_create_pr
        run: |
          set -euo pipefail
          BRANCH="ci/paas-sdk-sync-${GITHUB_RUN_ID}"
          TITLE="ci: Sync SDK changes from paas-backend (run ${GITHUB_RUN_ID})"
          BODY="Automated sync of ${SDK_DIR}/ from paas-backend.\n\nPaaS commit: ${GITHUB_SHA}"
          
          PR_URL=$(gh pr create --repo "${TARGET_REPO}" --head "${BRANCH}" --base "main" --title "${TITLE}" --body "${BODY}")
          echo "PR URL: $PR_URL"
  
          PR_NUMBER=$(echo "$PR_URL" | awk -F/ '{print $NF}')
          echo "pr_number=${PR_NUMBER}" >> $GITHUB_OUTPUT
          
          if [ -z "$PR_NUMBER" ] || [ "$PR_NUMBER" = "null" ]; then
            echo "Failed to create PR (gh output empty)"
            exit 1
          fi

      - name: Try auto-merge PR via gh (best-effort)
        if: steps.detect.outputs.changed_files != '' && steps.gh_create_pr.outputs.pr_number != ''
        id: gh_try_merge
        env:
          TARGET_REPO: ${{ env.SDK_REPO }}
        run: |
          set -euo pipefail
          PR_NUMBER="${{ steps.gh_create_pr.outputs.pr_number }}"
          if gh pr merge "${PR_NUMBER}" --repo "${TARGET_REPO}" --squash --delete-branch 2>/tmp/gh_merge_err; then
          echo "merged=true" >> $GITHUB_OUTPUT
          
          else
          echo "merged=false" >> $GITHUB_OUTPUT
          echo "merge-error:"
          cat /tmp/gh_merge_err || true
          
          fi

      - name: Create Release in SDK repo (if merged)
        if: steps.gh_try_merge.outputs.merged == 'true'
        env:
          SDK_REPO_TOKEN: ${{ secrets.SDK_REPO_TOKEN }}
          TARGET_REPO: ${{ env.SDK_REPO }}
        run: |
          set -euo pipefail

          TAG="v$(date +'%Y.%m.%d')-run${GITHUB_RUN_ID}"
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
  
          RELEASE_BODY="Automated release created after merging SDK sync from paas-backend.

          PaaS commit: ${GITHUB_SHA}
          Run: ${RUN_URL}"
  
          gh release create "$TAG" \
          --repo "${TARGET_REPO}" \
          --target main \
          --title "paas-backend sync ${GITHUB_RUN_ID}" \
          --notes "${RELEASE_BODY}"
