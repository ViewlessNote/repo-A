name: CI + Sync SDK -> backend-sdk

on:
  push:
    branches: [ "main" ]

permissions:
  contents: write
  pull-requests: write

env:
  SDK_REPO: "ViewlessNote/repo-B"
  SDK_DIR: "sdk"

jobs:
  build-and-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.20'

      - name: Detect SDK changes
        id: detect
        run: |
          CHANGED=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} -- ${{ env.SDK_DIR }} || true)
          echo "changed_files<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGED" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Exit if no SDK changes
        if: steps.detect.outputs.changed_files == ''
        run: echo "No sdk/ changes — nothing to sync."

      - name: Create subtree split commit (SHA) & local branch
        if: steps.detect.outputs.changed_files != ''
        id: split
        run: |
          set -euo pipefail
          SDK_DIR="${{ env.SDK_DIR }}"
          # erzeugt eine Commit-SHA, die nur den Inhalt von SDK_DIR enthält (oder leer)
          SPLIT_COMMIT=$(git subtree split --prefix="${SDK_DIR}" 2>/dev/null || true)
          echo "split_commit=${SPLIT_COMMIT}" >> $GITHUB_OUTPUT

          if [ -z "${SPLIT_COMMIT}" ]; then
            echo "No subtree split commit produced for prefix '${SDK_DIR}'. Nothing to push."
            exit 0
          fi

          # lege lokal einen Branch an (hilft beim Debugging)
          BRANCH="ci/paas-sdk-sync-${GITHUB_RUN_ID}"
          if git show-ref --verify --quiet "refs/heads/${BRANCH}"; then
            git branch -D "${BRANCH}" || true
          fi
          git branch "${BRANCH}" "${SPLIT_COMMIT}"
          echo "created_local_branch=${BRANCH}" >> $GITHUB_OUTPUT
          echo "split_branch=${BRANCH}" >> $GITHUB_OUTPUT

      - name: Push split commit as branch to SDK repo (robust + debug)
        if: steps.split.outputs.split_commit != ''
        env:
          TARGET_REPO: ${{ env.SDK_REPO }}
          SDK_REPO_TOKEN: ${{ secrets.SDK_REPO_TOKEN }}
        run: |
          set -euo pipefail

          SPLIT_COMMIT="${{ steps.split.outputs.split_commit }}"
          BRANCH="ci/paas-sdk-sync-${GITHUB_RUN_ID}"
          REMOTE_URL="https://x-access-token:${SDK_REPO_TOKEN}@github.com/${TARGET_REPO}.git"  # NO trailing slash!

          echo "DEBUG: split_commit=${SPLIT_COMMIT}"
          echo "DEBUG: branch=${BRANCH}"

          # sanity
          git rev-parse --verify "${SPLIT_COMMIT}" >/dev/null || { echo "ERROR: Split commit not found locally"; exit 1; }

          # API check - quick fail with clear message
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -H "Authorization: token ${SDK_REPO_TOKEN}" "https://api.github.com/repos/${TARGET_REPO}")
          echo "API HTTP status: ${HTTP_STATUS}"
          if [ "${HTTP_STATUS}" != "200" ]; then
            echo "ERROR: repository not accessible via API (HTTP ${HTTP_STATUS}). Check TARGET_REPO and token permissions."
            exit 1
          fi

          # ls-remote checks if Git-over-HTTPS access works
          if ! git ls-remote "${REMOTE_URL}" HEAD >/dev/null 2>&1; then
            echo "ERROR: git ls-remote failed. Token likely lacks Git-over-HTTPS permissions or repo path wrong."
            echo " - If you use a fine-grained token: ensure repo access and 'Contents: Read & write' are granted."
            echo " - If repo in Org: ensure PAT account is SSO-authorized."
            exit 1
          fi
          echo "ls-remote OK"

          # configure origin and push (push <sha>:refs/heads/<branch>)
          git remote remove origin 2>/dev/null || true
          git remote add origin "${REMOTE_URL}"
          git remote -v

          echo "Enabling git debug traces (will show HTTP auth attempt if push fails)"
          export GIT_TRACE=1
          export GIT_CURL_VERBOSE=1

          git push origin "${SPLIT_COMMIT}:refs/heads/${BRANCH}" || {
            echo "ERROR: git push failed — inspect git trace above for details (403/401/ssh auth, SSO, token scope)."
            exit 1
          }

          echo "pushed_branch=${BRANCH}" >> $GITHUB_OUTPUT

      - name: Create Pull Request in SDK repo
        if: steps.split.outputs.split_commit != ''
        id: create_pr
        env:
          SDK_REPO_TOKEN: ${{ secrets.SDK_REPO_TOKEN }}
        run: |
          set -euo pipefail
          BRANCH="${{ steps.split.outputs.split_branch }}"
          TITLE="ci: Sync SDK changes from paas-backend (run ${GITHUB_RUN_ID})"
          BODY="Automated sync of SDK changes from paas-backend.\n\nPaaS commit: ${GITHUB_SHA}\nRun: ${GITHUB_RUN_URL}"
          RESP=$(curl -s -X POST \
            -H "Authorization: token ${SDK_REPO_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ env.SDK_REPO }}/pulls" \
            -d "$(jq -n --arg t "$TITLE" --arg h "$BRANCH" --arg b "$BODY" '{title:$t, head:$h, base:"main", body:$b}')")
          echo "$RESP" > pr_response.json
          PR_NUMBER=$(jq -r .number pr_response.json)
          if [ "$PR_NUMBER" = "null" ] || [ -z "$PR_NUMBER" ]; then
            echo "Failed to create PR. Response:"
            cat pr_response.json
            exit 1
          fi
          echo "pr_number=${PR_NUMBER}" >> $GITHUB_OUTPUT
          echo "pr_url=$(jq -r .html_url pr_response.json)" >> $GITHUB_OUTPUT

      - name: Try auto-merge PR (if possible)
        if: steps.split.outputs.split_commit != '' && steps.create_pr.outputs.pr_number != ''
        id: try_merge
        env:
          SDK_REPO_TOKEN: ${{ secrets.SDK_REPO_TOKEN }}
        run: |
          set -euo pipefail
          PR=${{ steps.create_pr.outputs.pr_number }}
          MERGE_RESP=$(curl -s -X PUT \
            -H "Authorization: token ${SDK_REPO_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ env.SDK_REPO }}/pulls/${PR}/merge" \
            -d '{"merge_method":"squash"}')
          echo "$MERGE_RESP" > merge_response.json
          MERGED=$(jq -r .merged merge_response.json // "false")
          if [ "$MERGED" = "true" ]; then
            echo "merged=true" >> $GITHUB_OUTPUT
          else
            echo "merged=false" >> $GITHUB_OUTPUT
            cat merge_response.json
          fi

      - name: Create Release in SDK repo (if merged)
        if: steps.try_merge.outputs.merged == 'true'
        env:
          SDK_REPO_TOKEN: ${{ secrets.SDK_REPO_TOKEN }}
        run: |
          set -euo pipefail
          TAG="v$(date +'%Y.%m.%d')-run${GITHUB_RUN_ID}"
          RELEASE_NAME="paas-backend sync ${GITHUB_RUN_ID}"
          RELEASE_BODY="Automated release created after merging SDK sync from paas-backend.\nPaaS commit: ${GITHUB_SHA}\nRun: ${GITHUB_RUN_URL}"
          RESP=$(curl -s -X POST \
            -H "Authorization: token ${SDK_REPO_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ env.SDK_REPO }}/releases" \
            -d "$(jq -n --arg t "$TAG" --arg n "$RELEASE_NAME" --arg b "$RELEASE_BODY" --arg target "main" '{tag_name:$t, target_commitish:$target, name:$n, body:$b, draft:false, prerelease:false}')")
          echo "$RESP" > release_response.json
          cat release_response.json