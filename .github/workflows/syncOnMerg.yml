name: CI + Sync SDK -> backend-sdk

on:
  push:
    branches: [ "main" ]

permissions:
  contents: write
  pull-requests: write

env:
  SDK_REPO: "ViewlessNote/repo-B"
  SDK_DIR: "sdk"

jobs:
  build-and-sync:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.22'

      - name: Detect SDK changes
        id: detect
        run: |
          CHANGED=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} -- ${{ env.SDK_DIR }} || true)
          echo "changed_files<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGED" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Exit if no SDK changes
        if: steps.detect.outputs.changed_files == ''
        run: echo "No sdk/ changes — nothing to sync."

      - name: Get highest-priority SDK commit metadata
        if: steps.detect.outputs.changed_files != ''
        id: sdk_commit
        run: |
          set -euo pipefail
          RANGE="${{ github.event.before }}..${{ github.sha }}"
          BREAKING_REGEX='^[a-zA-Z]+(\([^)]+\))?!:'
          FEAT_REGEX='^feat(\([^)]+\))?:'
          FIX_OR_CHORE_REGEX='^(fix|chore)(\([^)]+\))?:'

          BEST_SCORE=0
          SDK_SUBJECT=""
          SDK_AUTHOR_NAME=""
          SDK_AUTHOR_EMAIL=""

          while IFS=$'\t' read -r SUBJECT AUTHOR_NAME AUTHOR_EMAIL; do
            [ -n "${SUBJECT}" ] || continue

            SCORE=0
            if [[ "${SUBJECT}" =~ ${BREAKING_REGEX} ]]; then
              SCORE=3
            elif [[ "${SUBJECT}" =~ ${FEAT_REGEX} ]]; then
              SCORE=2
            elif [[ "${SUBJECT}" =~ ${FIX_OR_CHORE_REGEX} ]]; then
              SCORE=1
            fi

            if [ -z "${SDK_SUBJECT}" ] || [ "${SCORE}" -gt "${BEST_SCORE}" ]; then
              BEST_SCORE="${SCORE}"
              SDK_SUBJECT="${SUBJECT}"
              SDK_AUTHOR_NAME="${AUTHOR_NAME}"
              SDK_AUTHOR_EMAIL="${AUTHOR_EMAIL}"
            fi
          done < <(git log --format=$'%s\t%an\t%ae' "$RANGE" -- "${{ env.SDK_DIR }}")

          if [ -z "${SDK_SUBJECT}" ]; then
            echo "No SDK commit metadata found in range ${RANGE}"
            exit 1
          fi

          echo "subject=${SDK_SUBJECT}" >> "$GITHUB_OUTPUT"
          echo "author_name=${SDK_AUTHOR_NAME}" >> "$GITHUB_OUTPUT"
          echo "author_email=${SDK_AUTHOR_EMAIL}" >> "$GITHUB_OUTPUT"

      - name: Create subtree split commit (SHA) & local branch
        if: steps.detect.outputs.changed_files != ''
        id: split
        run: |
          set -euo pipefail
          SDK_DIR="${{ env.SDK_DIR }}"
          # generate subtree split commit SHA for the SDK_DIR prefix;
          SPLIT_COMMIT=$(git subtree split --prefix="${SDK_DIR}" 2>/dev/null || true)
          echo "split_commit=${SPLIT_COMMIT}" >> $GITHUB_OUTPUT

          if [ -z "${SPLIT_COMMIT}" ]; then
            echo "No subtree split commit produced for prefix '${SDK_DIR}'. Nothing to push."
            exit 0
          fi

          # make a local branch
          BRANCH="ci/paas-sdk-sync-${GITHUB_RUN_ID}"
          if git show-ref --verify --quiet "refs/heads/${BRANCH}"; then
            git branch -D "${BRANCH}" || true
          fi
          git branch "${BRANCH}" "${SPLIT_COMMIT}"
          echo "created_local_branch=${BRANCH}" >> $GITHUB_OUTPUT
          echo "split_branch=${BRANCH}" >> $GITHUB_OUTPUT

      - name: Checkout SDK-Repo (target)
        if: steps.detect.outputs.changed_files != ''
        uses: actions/checkout@v4
        with:
          repository: ${{ env.SDK_REPO }}
          token: ${{ secrets.SDK_REPO_TOKEN }}
          path: paas-backend-sdk
          fetch-depth: 0

      - name: Merge SDK subtree history into target repo and push
        id: push
        if: steps.detect.outputs.changed_files != '' && steps.split.outputs.split_branch != ''
        working-directory: paas-backend-sdk
        env:
          SDK_DIR: ${{ env.SDK_DIR }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          BRANCH="ci/paas-sdk-sync-${GITHUB_RUN_ID}"
          SOURCE_REPO_PATH="$GITHUB_WORKSPACE"
          SOURCE_BRANCH="${{ steps.split.outputs.split_branch }}"

          echo "Merging subtree history from ${SOURCE_REPO_PATH}:${SOURCE_BRANCH} into branch $BRANCH"
          git config --global user.email "${GITHUB_ACTOR}@users.noreply.github.com"
          git config --global user.name "${GITHUB_ACTOR} (GitHub Actions)"

          git checkout -b "${BRANCH}" origin/main
          git fetch "${SOURCE_REPO_PATH}" "${SOURCE_BRANCH}:refs/remotes/source-sdk/${BRANCH}"

          if git merge-base --is-ancestor "refs/remotes/source-sdk/${BRANCH}" HEAD; then
            echo "Target repo already contains subtree history; nothing to push."
          else
            git merge --allow-unrelated-histories -X theirs --no-edit "refs/remotes/source-sdk/${BRANCH}"
            git push origin "${BRANCH}"
            echo "pushed_branch=${BRANCH}" >> $GITHUB_OUTPUT
          fi

      - name: Create PR in sdk-repo via gh
        if: steps.detect.outputs.changed_files != '' && steps.push.outputs.pushed_branch != ''
        env:
          TARGET_REPO: ${{ env.SDK_REPO }}
          GH_TOKEN: ${{ secrets.SDK_REPO_TOKEN }}
        id: gh_create_pr
        run: |
          set -euo pipefail
          BRANCH="ci/paas-sdk-sync-${GITHUB_RUN_ID}"
          TITLE="${{ steps.sdk_commit.outputs.subject }}"
          BODY="Automated sync of ${SDK_DIR}/ from paas-backend.\n\nPaaS commit: ${GITHUB_SHA}"
          
          PR_URL=$(gh pr create --repo "${TARGET_REPO}" --head "${BRANCH}" --base "main" --title "${TITLE}" --body "${BODY}")
          echo "PR URL: $PR_URL"
          
          PR_NUMBER=$(echo "$PR_URL" | awk -F/ '{print $NF}')
          echo "pr_number=${PR_NUMBER}" >> $GITHUB_OUTPUT
          
          if [ -z "$PR_NUMBER" ] || [ "$PR_NUMBER" = "null" ]; then
            echo "Failed to create PR (gh output empty)"
            exit 1
          fi

      - name: Try auto-merge PR via gh (best-effort)
        if: steps.detect.outputs.changed_files != '' && steps.gh_create_pr.outputs.pr_number != ''
        id: gh_try_merge
        env:
          TARGET_REPO: ${{ env.SDK_REPO }}
          GH_TOKEN: ${{ secrets.SDK_REPO_TOKEN }}
        run: |
          set -euo pipefail
          PR_NUMBER="${{ steps.gh_create_pr.outputs.pr_number }}"
          
          if gh pr merge "${PR_NUMBER}" --repo "${TARGET_REPO}" --merge --delete-branch 2>/tmp/gh_merge_err; then
          echo "merged=true" >> $GITHUB_OUTPUT
          
          else
          echo "merged=false" >> $GITHUB_OUTPUT
          echo "merge-error:"
          cat /tmp/gh_merge_err || true
          
          fi
